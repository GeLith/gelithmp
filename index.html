    <script>
        (function() {
            var sunPath = "M12,18C8.68629,18 6,15.3137 6,12C6,8.68629 8.68629,6 12,6C15.3137,6 18,8.68629 18,12C18,15.3137 15.3137,18 12,18ZM12,16C14.2091,16 16,14.2091 16,12C16,9.79086 14.2091,8 12,8C9.79086,8 8,9.79086 8,12C8,14.2091 9.79086,16 12,16ZM11,1H13V4H11V1ZM11,20H13V23H11V20ZM3.51472,4.92893L4.92893,3.51472L7.05025,5.63604L5.63604,7.05025L3.51472,4.92893ZM16.9497,18.364L18.364,16.9497L20.4853,19.0711L19.0711,20.4853L16.9497,18.364ZM19.0711,3.51472L20.4853,4.92893L18.364,7.05025L16.9497,5.63604L19.0711,3.51472ZM5.63604,16.9497L7.05025,18.364L4.92893,20.4853L3.51472,19.0711L5.63604,16.9497ZM23,11V13H20V11H23ZM4,11V13H1V11H4Z";
            var moonPath = "M10,2C10,2 5.5,6 5.5,12C5.5,17.5 10,22 10,22C7.5,22 5.5,20 5.5,17C5.5,14 7.5,12 7.5,12C7.5,12 9,14 12,14C15,14 17,12 17,12C17,12 19,14 19,17C19,20 17,22 14.5,22C14.5,22 19,17.5 19,12C19,6 14.5,2 14.5,2C14.5,2 12.5,4 10,2Z";
            var themeToggle = document.getElementById('themeToggle');
            var themeIcon = document.getElementById('themeIcon');
            var body = document.body;

            if (localStorage.getItem('theme') === 'night') {
                body.classList.add('night-mode');
                themeIcon.innerHTML = '<path d="' + moonPath + '"></path>';
            }

            themeToggle.addEventListener('click', function() {
                body.classList.toggle('night-mode');
                var isNight = body.classList.contains('night-mode');
                themeIcon.innerHTML = '<path d="' + (isNight ? moonPath : sunPath) + '"></path>';
                localStorage.setItem('theme', isNight ? 'night' : 'day');
            });

            var mouseFollower = document.getElementById('mouseFollower');
            var mouseX = 0, mouseY = 0, followerX = 0, followerY = 0;

            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            var tiltCards = document.querySelectorAll('.card');
            var tiltStates = [];
            tiltCards.forEach(function(card, idx) {
                tiltStates.push({
                    el: card,
                    rx: 0, ry: 0, s: 1,
                    trx: 0, try_: 0, ts: 1
                });
                card.addEventListener('mousemove', function(e) {
                    var rect = card.getBoundingClientRect();
                    var s = tiltStates[idx];
                    s.trx = (e.clientY - rect.top - rect.height / 2) / (rect.height / 2) * -14;
                    s.try_ = (e.clientX - rect.left - rect.width / 2) / (rect.width / 2) * 14;
                    s.ts = 1.05;
                });
                card.addEventListener('mouseleave', function() {
                    tiltStates[idx].trx = 0;
                    tiltStates[idx].try_ = 0;
                    tiltStates[idx].ts = 1;
                });
            });

            var particlesContainer = document.getElementById('particles');
            var MAX_PARTICLES = 25;
            var particleCount = 0;

            function createParticle() {
                if (particleCount >= MAX_PARTICLES) return;
                var particle = document.createElement('div');
                particle.classList.add('particle');
                var size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + 'vw';
                var colors = ['rgba(255,255,255,0.5)', 'rgba(120,119,198,0.4)', 'rgba(255,200,124,0.4)', 'rgba(100,210,255,0.4)'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                var duration = Math.random() * 20 + 10;
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particlesContainer.appendChild(particle);
                particleCount++;
                setTimeout(function() {
                    particle.remove();
                    particleCount--;
                }, (duration + 5) * 1000);
            }

            for (var i = 0; i < 15; i++) {
                setTimeout(createParticle, i * 400);
            }
            setInterval(createParticle, 800);

            function animate() {
                followerX += (mouseX - followerX) * 0.1;
                followerY += (mouseY - followerY) * 0.1;
                mouseFollower.style.left = followerX + 'px';
                mouseFollower.style.top = followerY + 'px';

                for (var i = 0; i < tiltStates.length; i++) {
                    var s = tiltStates[i];
                    s.rx += (s.trx - s.rx) / 15;
                    s.ry += (s.try_ - s.ry) / 15;
                    s.s += (s.ts - s.s) / 15;
                    s.el.style.transform = 'perspective(800px) rotateX(' + s.rx.toFixed(2) + 'deg) rotateY(' + s.ry.toFixed(2) + 'deg) scale(' + s.s.toFixed(4) + ')';
                }

                requestAnimationFrame(animate);
            }
            animate();

            window.addEventListener('load', function() {
                var loading = document.getElementById('loadingScreen');
                if (loading) loading.classList.add('hidden');
            });

            setTimeout(function() {
                var loading = document.getElementById('loadingScreen');
                if (loading) loading.classList.add('hidden');
            }, 800);
        })();
    </script>
