<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <radialGradient id="g1" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#4a3f8a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#1a3a5c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="10%" r="40%">
      <stop offset="0%" stop-color="#6b3fa0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c6bc4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c6bc4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c6bc4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4a90d9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#0a0e1a"/>

  <!-- Gradient blobs -->
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <rect width="1920" height="1080" fill="url(#g3)"/>

  <!-- Grid -->
  <g opacity="0.08" stroke="#7c6bc4" stroke-width="1">
    <line x1="0" y1="120" x2="1920" y2="120"/>
    <line x1="0" y1="240" x2="1920" y2="240"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="480" x2="1920" y2="480"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="840" x2="1920" y2="840"/>
    <line x1="0" y1="960" x2="1920" y2="960"/>
    <line x1="240" y1="0" x2="240" y2="1080"/>
    <line x1="480" y1="0" x2="480" y2="1080"/>
    <line x1="720" y1="0" x2="720" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1440" y1="0" x2="1440" y2="1080"/>
    <line x1="1680" y1="0" x2="1680" y2="1080"/>
  </g>

  <!-- Accent lines -->
  <line x1="200" y1="350" x2="800" y2="350" stroke="url(#line1)" stroke-width="2"/>
  <line x1="1100" y1="650" x2="1750" y2="650" stroke="url(#line1)" stroke-width="1.5"/>
  <line x1="500" y1="0" x2="500" y2="1080" stroke="url(#line2)" stroke-width="1"/>
  <line x1="1400" y1="0" x2="1400" y2="1080" stroke="url(#line2)" stroke-width="1"/>

  <!-- Geometric shapes -->
  <rect x="130" y="200" width="80" height="80" rx="4" fill="none" stroke="#7c6bc4" stroke-width="1.5" opacity="0.25" transform="rotate(15 170 240)"/>
  <rect x="1650" y="400" width="60" height="60" rx="3" fill="none" stroke="#4a90d9" stroke-width="1" opacity="0.2" transform="rotate(-20 1680 430)"/>
  <circle cx="960" cy="540" r="180" fill="none" stroke="#7c6bc4" stroke-width="0.8" opacity="0.1"/>
  <circle cx="960" cy="540" r="250" fill="none" stroke="#4a90d9" stroke-width="0.5" opacity="0.08"/>

  <!-- Dots -->
  <g fill="#7c6bc4" opacity="0.5">
    <circle cx="320" cy="180" r="2.5"/>
    <circle cx="650" cy="420" r="2"/>
    <circle cx="1100" cy="150" r="3"/>
    <circle cx="1500" cy="300" r="2"/>
    <circle cx="400" cy="700" r="2.5"/>
    <circle cx="850" cy="850" r="2"/>
    <circle cx="1350" cy="750" r="3"/>
    <circle cx="1700" cy="900" r="2"/>
    <circle cx="200" cy="500" r="1.5"/>
    <circle cx="1800" cy="180" r="2"/>
  </g>
  <g fill="#4a90d9" opacity="0.4">
    <circle cx="500" cy="300" r="2"/>
    <circle cx="1200" cy="500" r="2.5"/>
    <circle cx="750" cy="600" r="1.5"/>
    <circle cx="1550" cy="800" r="2"/>
    <circle cx="300" cy="900" r="2.5"/>
    <circle cx="1000" cy="200" r="1.5"/>
    <circle cx="1750" cy="550" r="2"/>
  </g>

  <!-- Small triangles -->
  <polygon points="880,100 900,70 920,100" fill="none" stroke="#7c6bc4" stroke-width="1" opacity="0.2"/>
  <polygon points="1600,850 1620,820 1640,850" fill="none" stroke="#4a90d9" stroke-width="1" opacity="0.15"/>

  <!-- Subtle noise texture overlay -->
  <rect width="1920" height="1080" fill="url(#g1)" opacity="0.15"/>
</svg>